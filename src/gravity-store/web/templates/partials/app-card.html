<article class="app-card">
    <div class="card-topline">
        <div class="app-icon" data-app-icon>
            <span aria-hidden="true">{{ app.initials }}</span>
            {% if app.icon_url %}
                <img src="{{ app.icon_url }}" alt="" loading="lazy" referrerpolicy="no-referrer">
            {% endif %}
        </div>
        <span class="source-label">{{ app.source_provider }}</span>
    </div>
    <div class="card-content">
        <p class="category">{{ app.category }}</p>
        <h3>{{ app.name }}</h3>
        <p class="summary">{{ app.summary }}</p>
    </div>
    <footer class="card-footer">
        <span>{% if app.version %}v{{ app.version }}{% else %}{{ app.package_id }}{% endif %}</span>
        <a href="{{ app.details_url }}" target="_blank" rel="noreferrer">Abrir <span aria-hidden="true">↗</span></a>
    </footer>
</article>
