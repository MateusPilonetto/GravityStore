<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gravity Store - Cadastro</title>

    <link
      rel="stylesheet"
      href="{{ url_for('register.static', filename='register.css') }}"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/png"
      href="{{ url_for('register.static', filename='Gwhite.svg') }}"
    />
  </head>
  <body>
    <header>
      <a href="{{ url_for('main.home') }}" class="logo-link">
        <img
          src="{{ url_for('register.static', filename='Gwhite.svg') }}"
          alt="Logotipo da Gravity Store"
          id="logo"
        />
        <h1 class="titulo">Gravity Store</h1>
      </a>
    </header>

    <main>
      {% if erro %}
      <div class="alerta erro">{{ erro }}</div>
      {% endif %}

      <section class="auth-card">
        <h2>Criar Conta</h2>
        <form action="/submit" method="post" class="auth-form">
          <div class="form-grid">
            <div class="coluna">
              <div class="input-group">
                <label for="nome">Nome completo</label>
                <div class="input-wrapper">
                  <span class="material-symbols-outlined">signature</span>
                  <input
                    type="text"
                    name="nome"
                    id="nome"
                    placeholder="João da Silva"
                    required
                  />
                </div>
              </div>

              <div class="input-group">
                <label for="user">Usuário</label>
                <div class="input-wrapper">
                  <span class="material-symbols-outlined">account_circle</span>
                  <input
                    type="text"
                    name="username"
                    id="user"
                    placeholder="joao.25"
                    required
                  />
                </div>
              </div>

              <div class="input-group">
                <label for="phone">Telefone</label>
                <div class="input-wrapper">
                  <span class="material-symbols-outlined">phone_enabled</span>
                  <input
                    type="tel"
                    name="phone"
                    id="phone"
                    placeholder="+55 11 99999-9999"
                    required
                  />
                </div>
                <p class="explain-text">
                  Usado para recuperação de senha ou 2FA.
                </p>
              </div>
            </div>

            <div class="coluna">
              <div class="input-group">
                <label for="email">E-mail</label>
                <div class="input-wrapper">
                  <span class="material-symbols-outlined">alternate_email</span>
                  <input
                    type="email"
                    name="email"
                    id="email"
                    placeholder="exemplo@email.com"
                    required
                  />
                </div>
              </div>

              <div class="input-group">
                <label for="senha">Senha</label>
                <div class="input-wrapper">
                  <span class="material-symbols-outlined">password</span>
                  <input
                    type="password"
                    name="senha"
                    id="senha"
                    placeholder="Crie uma senha"
                    required
                  />
                </div>
              </div>

              <div class="input-group">
                <label for="senha_confirmacao">Confirmar Senha</label>
                <div class="input-wrapper">
                  <span class="material-symbols-outlined">password</span>
                  <input
                    type="password"
                    name="senha_confirmacao"
                    id="senha_confirmacao"
                    placeholder="Repita a senha"
                    required
                  />
                </div>
              </div>
            </div>
          </div>

          <div class="btn-group-row">
            <a
              href="{{ url_for('login.login') }}"
              class="btn-secondary"
              id="loginPage"
              >Já tenho conta</a
            >
            <button type="submit" class="btn-primary" id="entra">
              Cadastrar
            </button>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
