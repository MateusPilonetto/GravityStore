<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- CSS -->
    <link
      rel="stylesheet"
      href="{{ url_for('dev.static', filename='apps.css') }}"
    />
    <!-- Fontes google -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
    <title>Lista de Apps</title>
  </head>
  <body>
    <header>
      <a href="{{ url_for('main.home') }}" class="logo-link">
        <img
          src="{{ url_for('dev.static', filename='Gwhite.svg') }}"
          alt="Logotipo da Gravity Store"
          id="logo"
        />
        <h1 class="titulo">Gravity Store</h1>
      </a>
    </header>
    <main>
      <section>
        <section class="popular">
          <h2 class="titleCard">Apps Cadastrados ✨</h2>

          <div class="cards">
            {% if apps %} {% for app in apps %}
            <div class="card">
              <div class="img">
                <img
                  src="{{ url_for('dev.static', filename='uploads/' ~ app.icon_path) }}"
                  alt="Ícone do app {{ app.nome }}"
                  style="
                    width: 100%;
                    height: 100%;
                    object-fit: cover;
                    border-radius: 15px;
                  "
                />
              </div>

              <div class="infos">
                <h2 class="title">{{ app.nome }}</h2>
                <span class="text"
                  ><a
                    href="{{ app.link_github }}"
                    target="_blank"
                    rel="noopener noreferrer"
                    style="text-decoration: none; color: white"
                    >{{ app.dev_name }} </a
                  >• {{ app.category }}</span
                >

                <div class="stats">
                  <h4 id="avaliacao">{{ app.size_mb }} MB</h4>
                </div>
                <div class="btns">
                  <a
                    href="{{ url_for('dev.edit_app', app_id=app.id) }}"
                    id="obter"
                    >EDITAR</a
                  >
                  <a
                    href="{{ url_for('dev.delete_app', app_id=app.id) }}"
                    id="excluir"
                    onclick="return confirm('Tem certeza que deseja excluir o app {{ app.nome }}?');"
                    style="
                      background-color: rgba(255, 77, 77, 0.2);
                      border-color: #ff4d4d;
                      color: #ff4d4d;
                    "
                    >EXCLUIR</a
                  >
                </div>
              </div>
            </div>
            {% endfor %} {% else %}
            <p style="margin-left: 20px; color: #aeb9d6">
              Nenhum aplicativo publicado ainda. Seja o primeiro!
            </p>
            {% endif %}
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
