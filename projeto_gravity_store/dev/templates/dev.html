<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gravity Store - Developers</title>
    <link
      rel="stylesheet"
      href="{{ url_for('dev.static', filename='dev.css') }}"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/png"
      href="{{ url_for('main.static', filename='Gwhite.svg') }}"
    />
  </head>
  <body>
    <header>
      <a href="{{ url_for('main.home') }}" class="logo-link">
        <img
          src="{{ url_for('dev.static', filename='Gwhite.svg') }}"
          alt="Logotipo da Gravity Store"
          id="logo"
        />
        <h1 class="titulo">Gravity Store</h1>
      </a>
    </header>

    <main>
      <section class="cadastro">
        <h2>Cadastrar Novo App</h2>

        <form
          action="/submit_app"
          method="post"
          class="app-form"
          enctype="multipart/form-data"
        >
          <div class="form-grid">
            <div class="coluna">
              <div class="input-group">
                <label for="nome">Nome do app</label>
                <input
                  type="text"
                  name="nome"
                  id="nome"
                  placeholder="Ex: Gravity Browser"
                  required
                />
              </div>

              <div class="input-group">
                <label for="devName">Nome do Dev</label>
                <input
                  type="text"
                  name="devName"
                  id="devName"
                  placeholder="Ex: joao.25"
                  required
                />
              </div>

              <div class="input-group">
                <label for="linkG">Link do GitHub do Dev</label>
                <input
                  type="url"
                  name="linkG"
                  id="linkG"
                  placeholder="https://github.com/joao123"
                  required
                />
              </div>

              <div class="input-group">
                <label for="linkA">Link de download do app</label>
                <input
                  type="url"
                  name="linkA"
                  id="linkA"
                  placeholder="https://..."
                  required
                />
              </div>

              <div class="input-group">
                <label for="desc">Descrição do app</label>
                <textarea
                  name="description"
                  id="desc"
                  rows="4"
                  placeholder="Descreva as funções do seu app..."
                  required
                ></textarea>
              </div>
            </div>

            <div class="coluna">
              <div class="input-group">
                <label for="category">Categoria</label>
                <input
                  type="text"
                  name="category"
                  id="category"
                  placeholder="Ex: Ferramentas, Jogos..."
                  required
                />
              </div>

              <div class="input-group">
                <label for="version">Versão do app</label>
                <input
                  type="text"
                  name="version"
                  id="version"
                  placeholder="Ex: 1.0.0"
                  required
                />
              </div>

              <div class="input-group">
                <label for="size">Tamanho (MB)</label>
                <input
                  type="number"
                  step="0.1"
                  name="size"
                  id="size"
                  placeholder="Ex: 25.5"
                  required
                />
              </div>

              <div class="input-group">
                <label for="iconApp">Ícone do app</label>
                <input
                  type="file"
                  name="iconApp"
                  id="iconApp"
                  accept="image/*"
                  required
                />
              </div>

              <div class="input-group">
                <label for="screenshots">Screenshots (Múltiplas)</label>
                <input
                  type="file"
                  name="screenshots"
                  id="screenshots"
                  accept="image/*"
                  multiple
                  required
                />
              </div>
            </div>
          </div>

          <div class="btn-container">
            <button type="submit" class="btn-primary" id="botao">Enviar Aplicativo</button>
            <a
              href="{{ url_for('dev.app_list') }}"
              class="btn-secondary"
              id="registro"
              >Lista de Apps</a
            >
          </div>
        </form>
      </section>
    </main>
    {% if sucesso %}
    <div
      style="
        background-color: #4caf50;
        color: white;
        padding: 15px;
        text-align: center;
        border-radius: 8px;
        margin-bottom: 20px;
      "
    >
      {{ sucesso }}
    </div>
    {% endif %}
  </body>
</html>
