<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editar App - Gravity Store</title>
    <link
      rel="stylesheet"
      href="{{ url_for('dev.static', filename='edit.css') }}"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/png"
      href="{{ url_for('main.static', filename='Gwhite.svg') }}"
    />
  </head>
  <body>
    <header>
      <a href="{{ url_for('main.home') }}" class="logo-link">
        <img
          src="{{ url_for('dev.static', filename='Gwhite.svg') }}"
          alt="Logotipo da Gravity Store"
          id="logo"
        />
        <h1 class="titulo">Gravity Store</h1>
      </a>
    </header>

    <main>
      <section class="cadastro">
        <h2>Editar Aplicativo: {{ app.nome }}</h2>

        <form
          action="{{ url_for('dev.edit_app', app_id=app.id) }}"
          method="post"
          class="app-form"
          enctype="multipart/form-data"
        >
          <div class="form-grid">
            <div class="coluna">
              <div class="input-group">
                <label for="nome">Nome do app</label>
                <input
                  type="text"
                  name="nome"
                  id="nome"
                  value="{{ app.nome }}"
                  required
                />
              </div>

              <div class="input-group">
                <label for="devName">Nome do Dev</label>
                <input
                  type="text"
                  name="devName"
                  id="devName"
                  value="{{ app.dev_name }}"
                  required
                />
              </div>

              <div class="input-group">
                <label for="linkG">Link do GitHub do Dev</label>
                <input
                  type="url"
                  name="linkG"
                  id="linkG"
                  value="{{ app.link_github }}"
                  required
                />
              </div>

              <div class="input-group">
                <label for="linkA">Link de download do app</label>
                <input
                  type="url"
                  name="linkA"
                  id="linkA"
                  value="{{ app.link_download }}"
                  required
                />
              </div>

              <div class="input-group">
                <label for="desc">Descrição do app</label>
                <textarea name="description" id="desc" rows="4" required>
{{ app.description }}</textarea
                >
              </div>
            </div>

            <div class="coluna">
              <div class="input-group">
                <label for="category">Categoria</label>
                <input
                  type="text"
                  name="category"
                  id="category"
                  value="{{ app.category }}"
                  required
                />
              </div>

              <div class="input-group">
                <label for="version">Versão do app</label>
                <input
                  type="text"
                  name="version"
                  id="version"
                  value="{{ app.version }}"
                  required
                />
              </div>

              <div class="input-group">
                <label for="size">Tamanho (MB)</label>
                <input
                  type="number"
                  step="0.1"
                  name="size"
                  id="size"
                  value="{{ app.size_mb }}"
                  required
                />
              </div>

              <div class="input-group">
                <label for="iconApp"
                  >Ícone do app (Opcional se quiser manter)</label
                >
                <input
                  type="file"
                  name="iconApp"
                  id="iconApp"
                  accept="image/*"
                />
              </div>

              <div class="input-group">
                <label for="screenshots"
                  >Screenshots (Opcional - Em breve)</label
                >
                <input
                  type="file"
                  name="screenshots"
                  id="screenshots"
                  accept="image/*"
                  multiple
                />
              </div>
            </div>
          </div>

          <div class="btn-container">
            <button type="submit" class="btn-primary" id="botao">
              Salvar Alterações
            </button>
            <a
              href="{{ url_for('dev.app_list') }}"
              class="btn-secondary"
              id="registro"
              style="
                display: flex;
                justify-content: center;
                align-items: center;
              "
              >Cancelar</a
            >
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
